name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: windows-latest
    env:
      OPENCAST_DATA_ROOT: D:\open-source\opencast-data
      npm_config_cache: D:\open-source\.cache\npm
      TEMP: D:\open-source\.temp
      TMP: D:\open-source\.temp
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
